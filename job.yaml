workerPoolSpecs:
  - machineSpec:
      machineType: g2-standard-8
      acceleratorType: NVIDIA_L4
      acceleratorCount: 1
    replicaCount: 1
    diskSpec:
      bootDiskType: pd-ssd
      bootDiskSizeGb: 200
    containerSpec:
      imageUri: "${IMAGE_URI}"
      command:
        - bash
        - -c
      args:
        - |
          set -euo pipefail
          echo "Running GPU preflight checks"
          nvidia-smi
          python src/gpu_preflight.py

          # Stage the cut Zarr store to local SSD: training does random
          # small-object reads (2 chunks/sample) that are latency-bound over the
          # /gcs FUSE mount and starve the GPU. Reading from local NVMe removes
          # the per-object network round-trips. The store is tens of thousands of
          # tiny chunk files, so the staging copy is parallelized via gcsfs
          # (a serial cp -r over the FUSE mount is latency-bound and takes hours).
          SRC=gs://norcorrdiff-us/taiwan_dataset/cwa_dataset/cwa_dataset_cut.zarr
          DST=/workspace/data_local/cwa_dataset_cut.zarr
          python scripts/stage_zarr.py --src "$SRC" --dst "$DST"
          du -sh "$DST"

          exec python src/train.py ++training.hp.total_batch_size=64 \
            --config-name=${CONFIG_NAME}
      env:
        - name: WANDB_API_KEY
          value: "${WANDB_API_KEY}"
        - name: WANDB_ENTITY
          value: "${WANDB_ENTITY}"
        - name: WANDB_PROJECT
          value: "${WANDB_PROJECT}"
# Dynamic Workload Scheduler (flex-start): queue the job and start it when the
# requested GPU frees up, instead of failing immediately on insufficient capacity.
scheduling:
  strategy: FLEX_START
  maxWaitDuration: 14400s

