workerPoolSpecs:
  - machineSpec:
      machineType: g2-standard-8
      acceleratorType: NVIDIA_L4
      acceleratorCount: 1
    replicaCount: 1
    diskSpec:
      bootDiskType: pd-ssd
      bootDiskSizeGb: 200
    containerSpec:
      imageUri: "${IMAGE_URI}"
      command:
        - bash
        - -c
      args:
        - |
          set -euo pipefail
          echo "Running GPU preflight checks"
          nvidia-smi
          python src/gpu_preflight.py

          exec python src/train.py ++training.hp.total_batch_size=64 \
            ++dataset.data_path=/gcs/norcorrdiff-us/taiwan_dataset/cwa_dataset/cwa_dataset.zarr \
            --config-name=config_training_taiwan_regression_gcp.yaml
      env:
        - name: WANDB_API_KEY
          value: "${WANDB_API_KEY}"
        - name: WANDB_ENTITY
          value: "${WANDB_ENTITY}"
        - name: WANDB_PROJECT
          value: "${WANDB_PROJECT}"
# Dynamic Workload Scheduler (flex-start): queue the job and start it when the
# requested GPU frees up, instead of failing immediately on insufficient capacity.
scheduling:
  strategy: FLEX_START
  maxWaitDuration: 14400s

