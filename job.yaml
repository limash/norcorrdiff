workerPoolSpecs:
  - machineSpec:
      machineType: a2-highgpu-1g
      acceleratorType: NVIDIA_TESLA_A100
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: "${IMAGE_URI}"
      command:
        - bash
        - -c
      args:
        - |
          set -euo pipefail
          echo "Running GPU preflight checks"
          nvidia-smi
          python src/gpu_preflight.py
          exec python src/train.py ++training.hp.total_batch_size=128 --config-name=config_training_taiwan_regression_gcp.yaml
      env:
        - name: WANDB_API_KEY
          value: "${WANDB_API_KEY}"
        - name: WANDB_ENTITY
          value: "${WANDB_ENTITY}"
        - name: WANDB_PROJECT
          value: "${WANDB_PROJECT}"

