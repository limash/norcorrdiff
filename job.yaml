workerPoolSpecs:
  - machineSpec:
      machineType: n1-highmem-4
      acceleratorType: NVIDIA_TESLA_T4
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: "${IMAGE_URI}"
      command:
        - bash
        - -lc
      args:
        - |
          set -euo pipefail
          echo "Running GPU preflight checks"
          if command -v nvidia-smi >/dev/null 2>&1; then
            nvidia-smi
          else
            echo "nvidia-smi not found in PATH"
          fi
          python - <<'PY'
          import torch

          print(f"torch={torch.__version__}")
          print(f"torch.version.cuda={torch.version.cuda}")
          print(f"cuda_available={torch.cuda.is_available()}")
          print(f"device_count={torch.cuda.device_count()}")

          if not torch.cuda.is_available():
              raise SystemExit("CUDA is not available inside the container. Failing fast.")
          PY
          exec python src/train.py ++training.hp.total_batch_size=8 --config-name=config_training_carra2_regression_gcp.yaml
      env:
        - name: WANDB_API_KEY
          value: "${WANDB_API_KEY}"
        - name: WANDB_ENTITY
          value: "${WANDB_ENTITY}"
        - name: WANDB_PROJECT
          value: "${WANDB_PROJECT}"

