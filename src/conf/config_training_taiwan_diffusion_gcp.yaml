results_dir: /gcs/norcorrdiff-us/results/diffusion_cwb_${now:%Y%m%d_%H%M%S}

hydra:
    job:
          chdir: false
          name: taiwan_diffusion
    run:
          dir: ${results_dir}/${hydra:job.name}
    searchpath:
          - pkg://conf/base # Do not modify

# Base parameters for dataset, model, training, and validation
defaults:

    - dataset: cwb
    # The dataset type for training.
    # Accepted values:
    #   `gefs_hrrr`: full GEFS-HRRR dataset for continental US.
    #   `hrrr_mini`: smaller HRRR dataset (continental US), for fast experiments.
    #   `cwb`: full CWB dataset for Taiwan.
    #   `custom`: user-defined dataset. Parameters need to be specified below.

    - model: diffusion
    # The model type.
    # Accepted values:
    #     `regression`: a regression UNet for deterministic predictions
    #     `lt_aware_ce_regression`: similar to `regression` but with lead time
    #       conditioning
    #     `diffusion`: a diffusion UNet for residual predictions
    #     `patched_diffusion`: a more memory-efficient diffusion model
    #     `lt_aware_patched_diffusion`: similar to `patched_diffusion` but
    #       with lead time conditioning

    - model_size: mini
    # The model size configuration.
    # Accepted values:
    #     `normal`: normal model size
    #     `mini`: smaller model size for fast experiments

    - training: ${model}
    # The base training parameters. Determined by the model type.


# Model parameters
model:
    model_args:
        model_type: "SongUNetPosEmbd"
        # SongUNetPosEmbd (not SongUNet) is required: EDMPrecondSuperResolution in
        # physicsnemo v2.0.0 passes embedding_selector in forward(), which SongUNet
        # doesn't accept.
        embedding_type: "positional"
        # Timestep/noise embedding. Overrides base default 'zero' (no noise
        # conditioning) with DDPM++ sinusoidal embedding of sigma.
        N_grid_channels: 0
        # SongUNetPosEmbd defaults to N_grid_channels=4 (sinusoidal lat/lon grid),
        # appending 4 channels internally in forward() before calling the parent
        # SongUNet. EDMPrecondSuperResolution doesn't account for this when setting
        # in_channels, causing a channel mismatch (20 expected, 24 received).
        # Set to 0 to disable the grid embedding since we have no lat/lon input.
    hr_mean_conditioning: true
    # High-res mean (regression's output) as additional condition

# Dataset parameters. Used for `custom` dataset type.
# Modify or add below parameters that should be passed as argument to the
# user-defined dataset class.
dataset:
    data_path: /workspace/data_local/cwa_dataset_cut.zarr
    # Pre-cut store (see scripts/make_cut_zarr.py): the 128x128 snippet is baked
    # into the data, so it is read as a plain `cwb` dataset.
    # Staged to local SSD by job.yaml before training (random small-object reads
    # over the /gcs FUSE mount are latency-bound and starve the GPU). The
    # canonical store lives at
    # gs://norcorrdiff-us/taiwan_dataset/cwa_dataset/cwa_dataset_cut.zarr
    img_shape_x: 128
    img_shape_y: 128
    add_grid: false
    ds_factor: 1

# Training parameters
training:
    perf:
        songunet_checkpoint_level: 1
        dataloader_workers: 8
        prefetch_factor: 6
    hp:
        training_duration: 200000000
        # Training duration based on the number of processed samples
        lr_rampup: 10000000
        # Rampup for learning rate, in number of samples
    io:
        regression_checkpoint_path: /gcs/norcorrdiff-us/results/regression_cwb_20260623_130422/checkpoints_regression/CorrDiffRegressionUNet.0.505024.mdlus
        results_dir: ${results_dir}

# Additional parameters for validation
validation:
    train: false
    all_times: false

# Parameters for wandb logging
wandb:
    mode: online
    # Configure whether to use wandb: "offline", "online", "disabled"
    results_dir: ${results_dir}/wandb
    # Directory to store wandb results
    watch_model: false
    # If true, wandb will track model parameters and gradients
